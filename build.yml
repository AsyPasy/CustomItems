name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -q
      - uses: actions/upload-artifact@v5
        with:
          name: UltiWither
          path: target/UltiWither-1.0.0.jar
